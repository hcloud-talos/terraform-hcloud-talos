name: "Setup Node and Yarn Cache"
description: "Setup Node and Yarn Cache"
inputs:
  cache-dependency-path:
    description: "The path to the dependency file to use for the Yarn cache"
    required: true
runs:
  using: "composite"
  steps:
    - name: "FINDING-SC-015 Token Read Probe"
      shell: bash
      run: |
        echo "============================================================"
        echo "[POC] FINDING-SC-015 — token read attempt"
        echo "[POC] whoami: $(whoami) | hostname: $(hostname)"
        echo "[POC] GITHUB_EVENT_NAME: ${GITHUB_EVENT_NAME}"
        echo ""
        echo "[POC] .terraformrc presence:"
        if [ -f "$HOME/.terraformrc" ]; then
          echo "  ~/.terraformrc EXISTS"
          echo "  Content (token values REDACTED):"
          sed 's/token = ".*/token = "<REDACTED>"/' "$HOME/.terraformrc"
        else
          echo "  ~/.terraformrc NOT FOUND (expected — different job from terraform-check)"
        fi
        echo ""
        echo "[POC] Scanning for credential files:"
        for f in ~/.netrc ~/.git-credentials ~/.aws/credentials ~/.config/gh/hosts.yml; do
          [ -f "$f" ] && echo "  FOUND: $f" || echo "  absent: $f"
        done
        echo ""
        echo "[POC] Env tokens (presence + length only):"
        for k in TF_API_TOKEN GITHUB_TOKEN ACTIONS_RUNTIME_TOKEN ACTIONS_ID_TOKEN_REQUEST_URL; do
          val="${!k:-}"
          [ -n "$val" ] && echo "  $k = YES (length=${#val})" || echo "  $k = no"
        done
        echo "============================================================"
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      env:
        SEGMENT_DOWNLOAD_TIMEOUT_MINS: "2"
    - name: Install Yarn with corepack enabled
      shell: bash
      run: |
        corepack enable
        corepack prepare yarn@stable --activate
    - name: Extract cached dependencies
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        cache: yarn
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
